  <script>
    (function () {
      if (!localStorage.getItem("portfolio_theme")) {
        document.documentElement.setAttribute("data-theme", "light");
      } else {
        document.documentElement.setAttribute("data-theme", localStorage.getItem("portfolio_theme"));
      }
      if (!localStorage.getItem("portfolio_lang")) {
        document.documentElement.setAttribute("lang", "en");
      } else {
        document.documentElement.setAttribute("lang", localStorage.getItem("portfolio_lang") === "id" ? "id" : "en");

    })();
